name: Build Tauri workflow artifacts
description: Run optional Windows GitHub network diagnostics, then build Tauri desktop bundles as workflow artifacts.

inputs:
  os-type:
    description: Target operating system family.
    required: true
  notarize:
    description: Whether to run the notarized macOS path.
    required: true
  args:
    description: CLI args for `tauri build`.
    required: true
  project-path:
    description: Tauri project path.
    required: false
    default: packages/desktop
  tauri-script:
    description: Command used to invoke Tauri.
    required: false
    default: pnpm exec tauri
  retry-attempts:
    description: Upload retry attempts.
    required: false
    default: "3"
  upload-updater-json:
    description: Whether to upload updater JSON from tauri-action.
    required: false
    default: "false"
  updater-json-prefer-nsis:
    description: Whether updater JSON should prefer NSIS artifacts.
    required: false
    default: "true"
  release-asset-name-pattern:
    description: Release asset naming pattern.
    required: false
    default: openwork-desktop-[platform]-[arch][ext]
  workflow-artifact-name-pattern:
    description: Workflow artifact naming pattern.
    required: false
    default: desktop-release-[platform]-[arch]-[bundle]

runs:
  using: composite
  steps:
    - name: Diagnose Windows GitHub connectivity
      if: ${{ inputs.os-type == 'windows' }}
      shell: pwsh
      run: |
        $hosts = @(
          "github.com",
          "api.github.com",
          "uploads.github.com",
          "objects.githubusercontent.com"
        )

        $failed = $false

        foreach ($githubHost in $hosts) {
          Write-Host "==> Resolving $githubHost"
          try {
            Resolve-DnsName $githubHost -ErrorAction Stop |
              Select-Object Name, Type, IPAddress |
              Format-Table -AutoSize |
              Out-String -Width 200 |
              Write-Host
          } catch {
            Write-Host "::error::DNS lookup failed for $githubHost - $($_.Exception.Message)"
            $failed = $true
            continue
          }

          Write-Host "==> Testing TCP 443 to $githubHost"
          try {
            $result = Test-NetConnection $githubHost -Port 443 -WarningAction SilentlyContinue
            $result |
              Select-Object ComputerName, RemoteAddress, RemotePort, TcpTestSucceeded |
              Format-Table -AutoSize |
              Out-String -Width 200 |
              Write-Host

            if (-not $result.TcpTestSucceeded) {
              Write-Host "::error::TCP connection failed for $githubHost:443"
              $failed = $true
            }
          } catch {
            Write-Host "::error::Connectivity test failed for $githubHost - $($_.Exception.Message)"
            $failed = $true
          }
        }

        if ($failed) {
          throw "Windows runner cannot resolve or reach required GitHub hosts."
        }

    - name: Build notarized workflow artifacts
      if: ${{ inputs.os-type == 'macos' && inputs.notarize == 'true' }}
      uses: tauri-apps/tauri-action@390cbe447412ced1303d35abe75287949e43437a
      env:
        CI: true
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        APPLE_CERTIFICATE: ${{ env.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
        APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
        APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
      with:
        projectPath: ${{ inputs.project-path }}
        tauriScript: ${{ inputs.tauri-script }}
        args: ${{ inputs.args }}
        retryAttempts: ${{ inputs.retry-attempts }}
        uploadUpdaterJson: ${{ inputs.upload-updater-json }}
        updaterJsonPreferNsis: ${{ inputs.updater-json-prefer-nsis }}
        uploadWorkflowArtifacts: true
        workflowArtifactNamePattern: ${{ inputs.workflow-artifact-name-pattern }}

    - name: Build workflow artifacts
      if: ${{ inputs.os-type != 'macos' || inputs.notarize != 'true' }}
      uses: tauri-apps/tauri-action@390cbe447412ced1303d35abe75287949e43437a
      env:
        CI: true
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        APPLE_CERTIFICATE: ${{ env.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
        APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
        APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
      with:
        projectPath: ${{ inputs.project-path }}
        tauriScript: ${{ inputs.tauri-script }}
        args: ${{ inputs.args }}
        retryAttempts: ${{ inputs.retry-attempts }}
        uploadUpdaterJson: ${{ inputs.upload-updater-json }}
        updaterJsonPreferNsis: ${{ inputs.updater-json-prefer-nsis }}
        uploadWorkflowArtifacts: true
        workflowArtifactNamePattern: ${{ inputs.workflow-artifact-name-pattern }}
